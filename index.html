<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>LifeGame</title><style>body{margin:0;font-family:system-ui;background:#eef4fb;color:#182235}.app{max-width:480px;margin:auto;padding:18px 16px 90px}.card{background:#fff;border-radius:24px;padding:18px;box-shadow:0 12px 30px #aac0df33;margin-bottom:14px}.hero{background:linear-gradient(135deg,#67a3ff,#356fd3);color:#fff}.row{display:flex;justify-content:space-between;align-items:center}.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px}.stat{background:#fff;border-radius:18px;padding:14px}.bar{height:8px;background:#e7edf6;border-radius:99px;overflow:hidden}.fill{height:100%;background:#5b96f7}.btn{width:100%;padding:14px;border:0;border-radius:16px;background:#4d89ec;color:#fff;font-weight:800;margin-top:10px}.event{padding:12px;background:#fff;border-radius:16px;margin:8px 0}.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);max-width:480px;width:100%;background:#ffffffee;display:grid;grid-template-columns:1fr 1fr 1fr;padding:10px 0}.nav button{border:0;background:none}.screen{display:none}.screen.active{display:block}h1,h2,h3,p{margin-top:0}</style></head><body><div class='app'><div class='row'><h1>LifeGame</h1><button onclick='resetGame()'>Reset</button></div><section id='life' class='screen active'><div class='card hero'><h2 id='name'>Alex Morgan</h2><p id='age'>Age 0</p><h3 id='money'>$0</h3></div><div class='stats'><div class='stat'>Health <b id='healthN'>90%</b><div class='bar'><div id='healthB' class='fill'></div></div></div><div class='stat'>Happiness <b id='happyN'>85%</b><div class='bar'><div id='happyB' class='fill'></div></div></div><div class='stat'>Smarts <b id='smartN'>60%</b><div class='bar'><div id='smartB' class='fill'></div></div></div><div class='stat'>Looks <b id='looksN'>65%</b><div class='bar'><div id='looksB' class='fill'></div></div></div></div><button class='btn' onclick='ageUp()'>Age Up +1 Year</button><h3>Timeline</h3><div id='events'></div></section><section id='activities' class='screen'><div class='card'><h2>Activities</h2><button class='btn' onclick="activity('Gym',5,2,0,2)">Go to Gym</button><button class='btn' onclick="activity('Study',0,-1,5,0)">Study</button><button class='btn' onclick="activity('Walk',2,5,0,0)">Take a Walk</button><button class='btn' onclick='lottery()'>Buy Lottery Ticket ($20)</button></div></section><section id='career' class='screen'><div class='card'><h2>Career</h2><p id='job'>Unemployed</p><button class='btn' onclick='applyJob()'>Apply for a Job</button></div></section></div><div class='nav'><button onclick="show('life')">Life</button><button onclick="show('activities')">Activities</button><button onclick="show('career')">Career</button></div><script>let s=JSON.parse(localStorage.lifegame||'null')||{age:0,cash:0,health:90,happy:85,smart:60,looks:65,job:null,events:['You were born.']};const save=()=>localStorage.lifegame=JSON.stringify(s);const clamp=n=>Math.max(0,Math.min(100,n));function render(){age.textContent='Age '+s.age;money.textContent='$'+s.cash.toLocaleString();healthN.textContent=s.health+'%';happyN.textContent=s.happy+'%';smartN.textContent=s.smart+'%';looksN.textContent=s.looks+'%';healthB.style.width=s.health+'%';happyB.style.width=s.happy+'%';smartB.style.width=s.smart+'%';looksB.style.width=s.looks+'%';job.textContent=s.job||'Unemployed';events.innerHTML=s.events.slice().reverse().map(e=>'<div class="event">'+e+'</div>').join('');save()}function ageUp(){s.age++;s.health=clamp(s.health-(s.age>45?2:0));if(s.job){s.cash+=s.job==='Software Developer'?70000:22000;s.events.push('Age '+s.age+': You earned your yearly salary.')}let r=Math.random();if(r<.25){s.happy=clamp(s.happy+5);s.events.push('Age '+s.age+': You had a great year.')}else if(r<.5){s.health=clamp(s.health-6);s.events.push('Age '+s.age+': You got sick.')}else{s.events.push('Age '+s.age+': Life moved forward.')}render()}function activity(n,h,ha,sm,l){s.health=clamp(s.health+h);s.happy=clamp(s.happy+ha);s.smart=clamp(s.smart+sm);s.looks=clamp(s.looks+l);s.events.push('Age '+s.age+': '+n+'.');render()}function lottery(){if(s.cash<20)return alert('You need $20');s.cash-=20;if(Math.random()<.1){s.cash+=1000;s.events.push('You won $1,000!')}else s.events.push('Your lottery ticket lost.');render()}function applyJob(){if(s.age<16)return alert('You must be at least 16.');s.job=s.smart>=75?'Software Developer':'Fast Food Crew';s.events.push('You got a job as '+s.job+'.');render()}function show(id){document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));document.getElementById(id).classList.add('active')}function resetGame(){localStorage.removeItem('lifegame');location.reload()}render()</script></body></html>
